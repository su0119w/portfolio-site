<!DOCTYPE html>
<html lang="zh-Hant-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>SoundLab 耳機品牌網站</title>
</head>

<body>
    <header>
        <div class="logo">
            <img src="img/su.png" alt="logo">
            <h1>SoundLab</h1>
        </div>
        <div class="header-a">
            <a href="#">購物車</a>
        </div>
    </header>
    <nav>
        <a href="#Pro">SoundLab Pro</a>
        <a href="#Air">SoundLab Air</a>
        <a href="#Mini">SoundLab Mini</a>
    </nav>
    <main>
        <section>
            <div class="hero">
                <h2>重新定義你的音樂體驗</h2>
                <p>結合極簡設計與高品質音效，打造更沉浸的聆聽感受。</p>
                <a href="#Pro">立即選購</a>
            </div>
        </section>
        <section class="products">
            <h2>熱門商品</h2>

            <div class="product-list"></div>
        </section>
        <section>
            <div class="SoundLab-Pro" id="Pro">
                <h2>SoundLab Pro</h2>
                <p>極致音質</p>
                <p>續航20小時</p>
                <p>主動降躁比air提升50%</p>
                <button id="Pro">立即購買</button>
            </div>
            <div class="SoundLab-Air" id="Air">
                <h2>SoundLab Air</h2>
                <p>性價比之王</p>
                <p>續行15小時</p>
                <p>主動降躁</p>
                <button id="Air">立即購買</button>
            </div>
            <div class="SoundLab-Mini" id="Mini">
                <h2>SoundLab Mini</h2>
                <p>輕巧設計，隨時隨地享受音樂</p>
                <p>續行10小時</p>
                <p>主動式降躁</p>
                <button id="Mini">立即購買</button>
            </div>
        </section>
    </main>
    <footer>
        <p>2026@SoundLab 耳機品牌網站</p>
    </footer>
    <script src="js/shop.js"></script>
</body>

</html>
